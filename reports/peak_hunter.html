<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peak Hunter: Optimized View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 40px;
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    letter-spacing: 3px;
    margin-bottom: 30px;
    text-transform: uppercase;
  }
  h1 span {
    color: #00ff66;
  }

  .dashboard {
    display: flex;
    gap: 30px;
    width: 100%;
    max-width: 1100px;
  }

  /* ---- Plot Area ---- */
  .plot-area {
    flex: 1;
    aspect-ratio: 1;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    min-height: 450px;
  }

  .plot-area .grid-line-h,
  .plot-area .grid-line-v {
    position: absolute;
    background: #1e1e1e;
  }
  .plot-area .grid-line-h {
    width: 100%;
    height: 1px;
  }
  .plot-area .grid-line-v {
    height: 100%;
    width: 1px;
  }

  .point {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.2s;
    cursor: pointer;
  }
  .point:hover {
    transform: translate(-50%, -50%) scale(1.6);
    z-index: 10;
  }
  .point.normal {
    background: #4488ff;
    box-shadow: 0 0 6px #4488ff88;
  }
  .point.best {
    background: #ffcc00;
    border: 2px solid #ffcc00;
    box-shadow: 0 0 12px #ffcc0088, 0 0 24px #ffcc0044;
    width: 16px;
    height: 16px;
  }

  .point .tooltip {
    display: none;
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    border: 1px solid #444;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    color: #ccc;
    font-family: 'JetBrains Mono', monospace;
    z-index: 20;
  }
  .point:hover .tooltip {
    display: block;
  }

  /* ---- Right Panel ---- */
  .panel {
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 20px;
  }

  .card h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    margin-bottom: 12px;
  }

  /* Sliders */
  .slider-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .slider-row label {
    font-size: 13px;
    color: #aaa;
  }
  .slider-row .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #fff;
    min-width: 45px;
    text-align: right;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #333;
    border-radius: 2px;
    outline: none;
    margin: 4px 0 12px 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4488ff;
    cursor: pointer;
    box-shadow: 0 0 6px #4488ff88;
  }

  .badge {
    display: inline-block;
    background: #1a3a1a;
    color: #00ff66;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    margin-top: 6px;
  }

  /* Clicks Remaining */
  .clicks-card {
    border-left: 3px solid #ffcc00;
  }
  .clicks-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 42px;
    font-weight: 700;
    color: #00ff66;
    line-height: 1;
  }
  .clicks-sub {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  th {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid #333;
    color: #888;
    font-weight: 600;
  }
  td {
    padding: 6px 8px;
    border-bottom: 1px solid #1e1e1e;
  }
  tr.best-row {
    background: #2a2a00;
    color: #ffcc00;
    font-weight: 700;
  }
  tr.best-row td {
    color: #ffcc00;
  }
</style>
</head>
<body>

<h1>Peak Hunter: <span>Optimized View</span></h1>

<div class="dashboard">
  <!-- Left: Plot -->
  <div class="plot-area" id="plot">
    <!-- Grid lines injected by JS -->
  </div>

  <!-- Right: Controls -->
  <div class="panel">

    <div class="card">
      <h3>Visualization Layer</h3>
      <select style="width:100%;padding:8px;background:#222;color:#fff;border:1px solid #444;border-radius:4px;font-family:'JetBrains Mono',monospace;">
        <option>Nothing</option>
        <option>GP Mean</option>
        <option>GP Uncertainty</option>
        <option>Acquisition Function</option>
      </select>

      <div style="margin-top: 18px;">
        <div class="slider-row">
          <label>Kernel Lengthscale:</label>
          <span class="val" id="ls-val">0.12</span>
        </div>
        <input type="range" min="0.01" max="1" step="0.01" value="0.12"
               oninput="document.getElementById('ls-val').textContent=this.value">

        <div class="slider-row">
          <label>Epsilon (ε):</label>
          <span class="val" id="eps-val">0.010</span>
        </div>
        <input type="range" min="0.001" max="0.5" step="0.001" value="0.01"
               oninput="document.getElementById('eps-val').textContent=parseFloat(this.value).toFixed(3)">

        <div class="slider-row">
          <label>Delta (δ):</label>
          <span class="val" id="delta-val">0.010</span>
        </div>
        <input type="range" min="0.001" max="0.5" step="0.001" value="0.01"
               oninput="document.getElementById('delta-val').textContent=parseFloat(this.value).toFixed(3)">

        <div class="slider-row">
          <label>Calculated Beta (√β_t):</label>
          <span class="val" style="color:#00ff66;">28.63</span>
        </div>

        <div class="badge">Normalized Acq Heatmap Enabled</div>
      </div>
    </div>

    <div class="card clicks-card">
      <h3>Clicks Remaining</h3>
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <div class="clicks-value">34.2</div>
        <span class="clicks-sub">15 / 20</span>
      </div>
      <div class="clicks-sub" style="margin-top:2px;">Best temperature found</div>
    </div>

    <div class="card">
      <h3>Sample Log</h3>
      <table>
        <thead>
          <tr><th>#</th><th>X</th><th>Y</th><th>Value</th></tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const points = [{"x": 0.535, "y": 0.809, "lat": 55.6761, "lng": 12.5683, "temp": 2.5, "method": "manual_search"}, {"x": 0.542, "y": 0.639, "lat": 25.0, "lng": 15.0, "temp": 22.9, "method": "initial_test"}, {"x": 0.92, "y": 0.312, "lat": -33.8688, "lng": 151.2093, "temp": 25.1, "method": "grid_search"}, {"x": 0.294, "y": 0.726, "lat": 40.7128, "lng": -74.006, "temp": 4.2, "method": "grid_search"}, {"x": 0.37, "y": 0.369, "lat": -23.5505, "lng": -46.6333, "temp": 28.5, "method": "grid_search"}, {"x": 0.888, "y": 0.698, "lat": 35.6762, "lng": 139.6503, "temp": 12.0, "method": "grid_search"}, {"x": 0.602, "y": 0.493, "lat": -1.2921, "lng": 36.8219, "temp": 29.8, "method": "grid_search"}, {"x": 0.5, "y": 0.786, "lat": 51.5074, "lng": -0.1278, "temp": 8.5, "method": "grid_search"}, {"x": 0.225, "y": 0.608, "lat": 19.4326, "lng": -99.1332, "temp": 21.3, "method": "grid_search"}, {"x": 0.587, "y": 0.667, "lat": 30.0444, "lng": 31.2357, "temp": 18.9, "method": "grid_search"}, {"x": 0.524, "y": 0.55, "lat": 9.082, "lng": 8.6753, "temp": 34.2, "method": "grid_search"}, {"x": 0.367, "y": 0.412, "lat": -15.7975, "lng": -47.8919, "temp": 26.7, "method": "grid_search"}, {"x": 0.439, "y": 0.856, "lat": 64.1265, "lng": -21.8174, "temp": -2.5, "method": "grid_search"}, {"x": 0.338, "y": 0.308, "lat": -34.6037, "lng": -58.3816, "temp": 24.1, "method": "grid_search"}, {"x": 0.507, "y": 0.771, "lat": 48.8566, "lng": 2.3522, "temp": 10.2, "method": "grid_search"}];
  const bestIdx = 10;
  const plot = document.getElementById('plot');
  const tbody = document.getElementById('table-body');

  // Draw grid lines
  for (let i = 1; i < 5; i++) {
    const h = document.createElement('div');
    h.className = 'grid-line-h';
    h.style.top = (i * 20) + '%';
    plot.appendChild(h);

    const v = document.createElement('div');
    v.className = 'grid-line-v';
    v.style.left = (i * 20) + '%';
    plot.appendChild(v);
  }

  // Draw points and populate table
  points.forEach((p, i) => {
    // Plot point
    const dot = document.createElement('div');
    dot.className = 'point ' + (i === bestIdx ? 'best' : 'normal');
    dot.style.left = (p.x * 100) + '%';
    dot.style.bottom = (p.y * 100) + '%';

    const tip = document.createElement('div');
    tip.className = 'tooltip';
    tip.textContent = p.temp + '°C  (' + p.lat + ', ' + p.lng + ')';
    dot.appendChild(tip);

    plot.appendChild(dot);

    // Table row
    const tr = document.createElement('tr');
    if (i === bestIdx) tr.className = 'best-row';
    const method = p.method.charAt(0).toUpperCase();
    tr.innerHTML = '<td>' + method + '</td><td>' + p.x + '</td><td>' + p.y + '</td><td>' + p.temp + '</td>';
    tbody.appendChild(tr);
  });
</script>

</body>
</html>
